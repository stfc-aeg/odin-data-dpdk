[server]
debug_mode = 1
http_port = 8888
http_addr =
# static_path =
adapters = camera_control, live_data
enable_cors = true

[tornado]
logging = debug

[adapter.camera_control]
module = camera_control.adapter.CameraAdapter
camera_endpoint = tcp://127.0.0.1:9001
camera_name = aravis

status_bg_task_enable = 1
status_bg_task_interval = 1

[adapter.live_data]
module = live_data.live_data_adapter.LiveDataAdapter
# Connections are defined by endpoints and given names for reference.
# Remove endpoint to remove connection, give each endpoint a name. Excess names are not used.
livedata_endpoint = tcp://192.168.0.138:5020
endpoint_name = aravis
# Pixel resolution expressed as WIDTHxHEIGHT
camera_resolution = 5496x3672