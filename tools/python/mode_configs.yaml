# Per-mode HDF plugin configuration for decoder mode selection.
# Each top-level key is the mode name sent to the main plugin.
# The 'hdf' block under each mode is merged into the configure message.

histogram_128:
  hdf:
    dataset:
      dummy:
        datatype: uint32
        dims: [80, 80, 128]
        compression: none
    file:
      path: /tmp/
    frames: 0
    acquisition_id: test_1
    write: false
    timeout_timer_period: 10000
    process:
      number: 1
      rank: 0

